namespace: prod

image:
  repository: "" # Set by CI/CD pipeline (ECR URL)
  tag: "latest"
  pullPolicy: Always

replicaCount: 2

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

container:
  port: 8080
  env:
    PORT: "8080"
    REDIS_HOST: "counter-service-redis"
    REDIS_PORT: "6379"
    LOG_LEVEL: "INFO"
    APP_VERSION: "0.1.0"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

persistence:
  enabled: false
  storageClass: gp3-encrypted
  size: 1Gi
  mountPath: /data

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 70

pdb:
  enabled: true
  minAvailable: 1

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
